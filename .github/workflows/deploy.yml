name: Deploy to GitHub Pages

on:
  push:
    branches: [master, claude/create-new-repository-ZfiBS]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Build the affiliate site at the repo root → dist/
      - run: npm ci
      - run: npm run build
      # Build the PWA hub from claude-apps/ → claude-apps/dist
      - name: Install PWA deps
        working-directory: claude-apps
        run: npm ci
      - name: Build PWA
        working-directory: claude-apps
        run: npm run build
      # Merge: PWA goes to /apps/ inside the affiliate's dist
      - run: mv claude-apps/dist dist/apps
      # SPA fallback for the PWA's deep links (e.g. /ramen/apps/apps/mood)
      - run: cp dist/apps/index.html dist/apps/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
